<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produtos — MiniShop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body> 

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="assets/img/logo.svg" alt="MiniShop">
        <strong>MiniShop</strong>
      </a>
      <div class="ms-auto">
        <a href="index.html" class="btn btn-outline-light btn-sm">← Voltar à loja</a>
        <a href="#" id="btn-logout" class="btn btn-outline-light btn-sm">Sair</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4 mb-5">
    <h2 class="mb-4">Gerenciar Produtos</h2>

    <div class="row">
      <!-- Formulário -->
      <div class="col-lg-4 mb-4">
        <div class="card p-3">
          <h5 id="titulo-form">Novo Produto</h5>
          <form id="form-produto">
            <div class="mb-2">
              <label class="form-label">Nome</label>
              <input type="text" class="form-control" id="prod-nome" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Categoria</label>
              <input type="text" class="form-control" id="prod-categoria" required>
            </div>
            <div class="row">
              <div class="col-6 mb-2">
                <label class="form-label">Preço (R$)</label>
                <input type="number" step="0.01" class="form-control" id="prod-preco" required>
              </div>
              <div class="col-6 mb-2">
                <label class="form-label">Estoque</label>
                <input type="number" class="form-control" id="prod-estoque" required>
              </div>
            </div>
            <div class="mb-2">
              <label class="form-label">Descrição</label>
              <textarea class="form-control" id="prod-descricao" rows="3" required></textarea>
            </div>
            <div class="mb-2">
              <label class="form-label">URL da Imagem</label>
              <input type="text" class="form-control" id="prod-imagem" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Avaliação (0 a 5)</label>
              <input type="number" step="0.1" min="0" max="5" class="form-control" id="prod-avaliacao">
            </div><br>
            <button type="submit" class="btn btn-primary w-100 mb-2">Salvar</button>
            <button type="button" id="btn-cancelar-edicao" class="btn btn-outline-secondary w-100 d-none">Cancelar edição</button>
          </form>
        </div>
      </div>

      <!-- Tabela de produtos -->
      <div class="col-lg-8">
        <div class="table-responsive">
          <table class="table table-bordered bg-white align-middle">
            <thead class="table-light">
              <tr>
                <th>Imagem</th>
                <th>Nome</th>
                <th>Categoria</th>
                <th>Preço</th>
                <th>Estoque</th>
                <th>Destaque</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabela-produtos-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/scripts/login.js"></script>
  <script src="assets/scripts/crud.js"></script>
</body>
</html>
