<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body>
 
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="assets/img/logo.svg" alt="MiniShop">
        <strong>MiniShop</strong>
      </a>
    </div>
  </nav>

  <div class="container">
    <div class="auth-card">
      <h3 class="mb-4 text-center">Entrar na sua conta</h3>

      <div id="login-alerta" class="alert alert-danger d-none"></div>

      <form id="form-login">
        <div class="mb-3">
          <label for="login-usuario" class="form-label">Login</label>
          <input type="text" class="form-control" id="login-usuario" required>
        </div>
        <div class="mb-3">
          <label for="login-senha" class="form-label">Senha</label>
          <input type="password" class="form-control" id="login-senha" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Entrar</button>
      </form>

      <p class="text-center mt-3 mb-0">
        Não tem conta? <a href="cadastro_usuario.html">Cadastre-se</a>
      </p>
      <p class="text-center text-muted small mt-2">
        Dica de teste: login <strong>admin</strong> / senha <strong>123</strong> (administrador)<br>
        ou login <strong>user</strong> / senha <strong>123</strong> (usuário comum)
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/scripts/login.js"></script>
</body>
</html>
