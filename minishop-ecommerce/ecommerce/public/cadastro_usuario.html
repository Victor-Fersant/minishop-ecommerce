<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body> 

  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="assets/img/logo.svg" alt="MiniShop">
        <strong>MiniShop</strong>
      </a>
    </div>
  </nav>

  <div class="container">
    <div class="auth-card">
      <h3 class="mb-4 text-center">Criar nova conta</h3>

      <div id="cadastro-alerta" class="alert alert-danger d-none"></div>

      <form id="form-cadastro-usuario">
        <div class="mb-3">
          <label for="cad-nome" class="form-label">Nome completo</label>
          <input type="text" class="form-control" id="cad-nome" required>
        </div>
        <div class="mb-3">
          <label for="cad-email" class="form-label">E-mail</label>
          <input type="email" class="form-control" id="cad-email" required>
        </div>
        <div class="mb-3">
          <label for="cad-login" class="form-label">Login</label>
          <input type="text" class="form-control" id="cad-login" required>
        </div>
        <div class="mb-3">
          <label for="cad-senha" class="form-label">Senha</label>
          <input type="password" class="form-control" id="cad-senha" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
      </form>

      <p class="text-center mt-3 mb-0">
        Já tem conta? <a href="login.html">Entrar</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/scripts/login.js"></script>
</body>
</html>
